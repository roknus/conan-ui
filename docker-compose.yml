services:
  conan-ui:
    build: .
    container_name: conan-ui
    ports:
      - "3000:80"    # Frontend (nginx)
      - "8000:8000"  # Backend API (direct access)
    environment:
      # Optional configurations
      - CONAN_HOME=${CONAN_HOME:-/app/.conan2}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - FRONTEND_PORT=${FRONTEND_PORT:-80}
      # Repositories: the Artifactory host plus the Conan repos on it.
      # Each remote's URL is derived as
      #   ${ARTIFACTORY_URL}/artifactory/api/conan/<name>
      # The first name in CONAN_REMOTES is the default remote.
      - ARTIFACTORY_URL=${ARTIFACTORY_URL:-}
      - CONAN_REMOTES=${CONAN_REMOTES:-}
      # Remote credentials — set these in a gitignored .env.
      - CONAN_LOGIN_USERNAME=${CONAN_LOGIN_USERNAME:-}
      - CONAN_PASSWORD=${CONAN_PASSWORD:-}

    volumes:
      # Optional: Mount local Conan home to persist cache
      - conan-cache:/app/.conan2
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  conan-cache:
    driver: local
